<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking Confirmation</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 mx-3">
    
    <h2 class="text-xl font-semibold text-center text-gray-800 mb-6">
      Confirm Parking
    </h2>

    <form class="space-y-4"  method="POST"  action="F-MAP">

      <!-- Number Plate -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Number Plate
        </label>
        <input 
          type="text" 
          placeholder="e.g. KAA 123A"
          class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-base"
        >
      </div>

      <!-- Phone Number -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Phone Number
        </label>
        <input 
          type="tel" 
          placeholder="e.g. 07XXXXXXXX"
          class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-base"
        >
      </div>

      <!-- Action Button (NEW) -->
      <div>
        <button 
          type="button"
          class="w-full bg-gray-200 text-gray-800 py-3 rounded-lg font-medium text-base hover:bg-gray-300 transition"
        >
          Send OTP
        </button>
      </div>

      <!-- OTP -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          OTP Code
        </label>
        <input 
          type="text" 
          placeholder="Enter OTP"
          class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-base text-center tracking-widest"
        >
      </div>

      <!-- Submit -->
      <button 
        type="submit"
        class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium text-lg hover:bg-blue-700 transition"
      >
        Confirm Parking
      </button>

    </form>

  </div>

</body>
</html>
