<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏙️ PARK PLACE 🏙️</title>

  <!-- Leaflet (no API key) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Bootstrap CSS (optional) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    #map {
      width: 100%;
      height: 400px;
    }
  </style>
</head>
<body class="flex flex-col items-center min-h-screen">
  <h1 class="text-3xl text-green-500 font-bold text-center mt-6">🏙️ PARK PLACE 🏙️</h1>

  <div class="w-4/5 mt-6 border-2 border-gray-300 rounded-2xl shadow-lg p-4 flex flex-col h-[80vh] relative">
    <div id="map" class="rounded-xl flex-1"></div>

    <div class="flex flex-wrap gap-4 mt-4">
      <input type="text" id="lattitude" placeholder="Latitude" class="form-control flex-1">
      <input type="text" id="longitude" placeholder="Longitude" class="form-control flex-1">
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="coordModal" tabindex="-1" aria-labelledby="coordModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="text-xl md:text-2xl font-bold text-blue-600" id="coordModalLabel">📌 🅿️</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form method="post" action="BOOKPARKING">
            <label>Latitude:</label>
            <input type="text" id="modal-lat" class="form-control mb-2" readonly>
            <label>Longitude:</label>
            <input type="text" id="modal-lng" class="form-control mb-2" readonly>
            <label>CAR-REG:</label>
            <input type="text" id="modal-carreg" class="form-control mb-2">
            <label>LOCATION:</label>
            <input type="text" id="modal-location" class="form-control">
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="confirmCoords">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let map, marker;
    let userPos = null;

    // Initialize Leaflet map
    map = L.map('map').setView([ -0.06575, 34.77402 ], 15);

    // Add OpenStreetMap tiles (no API key)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Center marker
    marker = L.marker([ -0.06575, 34.77402 ]).addTo(map).bindPopup('🅿️ Park Place').openPopup();

    // Click on map → update inputs and popup
    map.on('click', function(e) {
      const lat = e.latlng.lat;
      const lng = e.latlng.lng;

      $('#modal-lat').val(lat.toFixed(6));
      $('#modal-lng').val(lng.toFixed(6));
      new bootstrap.Modal(document.getElementById('coordModal')).show();
    });

    // Optional: update inputs on mouse move
    map.on('mousemove', function(e) {
      $('#lattitude').val(e.latlng.lat.toFixed(6));
      $('#longitude').val(e.latlng.lng.toFixed(6));
    });

    // Confirm modal
    $(document).on("click", "#confirmCoords", function(){
      const lat = parseFloat($("#modal-lat").val());
      const lng = parseFloat($("#modal-lng").val());
      $("#lattitude, #longitude").val([lat, lng]);

      if (!isNaN(lat) && !isNaN(lng)) {
        marker.setLatLng([lat, lng]).bindPopup('🅿️ Park Place');
        map.setView([lat, lng], 15);
      }
      bootstrap.Modal.getInstance(document.getElementById('coordModal')).hide();
    });
  </script>
</body>
</html>
