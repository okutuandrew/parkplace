<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏙️ PARK PLACE 🏙️</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
html, body { height: 100%; margin:0; padding:0; }
#map {
  width: 95vw;
  height: 95vh;
  margin: 2.5vh 2.5vw;
  border-radius: 12px;
}
</style>
</head>

<body class="bg-gray-100">

<div class="flex flex-col items-center">
  <h3 class="text-center text-green-600 text-2xl font-bold mt-2">🏙️ PARK PLACE 🏙️</h3>

  <button id="getLocationBtn" class="btn btn-success mt-2 mb-2 w-4/5 max-w-md">📍 Use My Location</button>

  <div id="map"></div>

  <div id="infoBox" class="fixed top-5 right-5 bg-white/95 p-4 rounded-xl shadow-2xl z-[9999] w-72">
    <h4 class="font-bold text-xl mb-2 text-blue-600">📌 Map Info</h4>
    <p id="infoContent" class="text-sm text-gray-700">
      Click on the map to see coordinates here.
    </p>
    <div class="flex gap-2 mt-2 w-4/5 max-w-md">
      <input type="text" id="lattitude" class="form-control flex-1" placeholder="Latitude">
      <input type="text" id="longitude" class="form-control flex-1" placeholder="Longitude">
    </div>
  </div>
</div>

<script>
let map = L.map('map').setView([-0.06575, 34.77402], 15);
let userPos = null;
let userMarker = null;
let routeLine = null;
let lastClicks = [];
let markerLayers = []; // stores current markers

// Tile Layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// =======================
// USER LOCATION
// =======================
function updateUserLocation(lat, lng) {
  userPos = { lat, lng };
  if (userMarker) {
    userMarker.setLatLng([lat, lng]);
  } else {
    userMarker = L.circleMarker([lat, lng], {
      radius: 10,
      fillColor: "#007bff",
      color: "#ffffff",
      weight: 3,
      opacity: 1,
      fillOpacity: 1
    }).addTo(map).bindPopup("📍 You are here").openPopup();
  }
}

// Use location button
document.getElementById("getLocationBtn").addEventListener("click", () => {
  if (!navigator.geolocation) { alert("❌ Geolocation not supported"); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      updateUserLocation(pos.coords.latitude, pos.coords.longitude);
      map.setView([pos.coords.latitude, pos.coords.longitude], 16);
    },
    err => { alert("⚠️ Location failed. Turn on GPS and allow permission."); },
    { enableHighAccuracy:true, timeout:15000, maximumAge:0 }
  );
});

// Live tracking
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(
    pos => updateUserLocation(pos.coords.latitude, pos.coords.longitude),
    err => console.log("GPS watch error:", err.message),
    { enableHighAccuracy:true, maximumAge:5000, timeout:10000 }
  );
}

// =======================
// LOAD MARKERS
// =======================
function loadMarkers(parkingData) {
  // Remove previous markers
  markerLayers.forEach(m => map.removeLayer(m));
  markerLayers = [];

  parkingData.forEach(p => {
    const marker = L.circleMarker([p.lat, p.lng], {
      radius: 10,
      fillColor: p.color,
      color: "#fff",
      weight: 2,
      fillOpacity: 0.9
    }).addTo(map);

    const contentHTML = p.content ? p.content.replace(/\n/g, "<br>") : "";
    marker.bindPopup(`<div style="text-align:center"><b style="color:${p.color}">${p.title}</b><br>${contentHTML}</div>`);

    markerLayers.push(marker);
  });
}

// =======================
// DUMMY JSON FETCH
// =======================
function fetchParkingData() {
  // Dummy data (replace with your server URL later)
  const dummyData = [
    { lat: -0.06575, lng: 34.77502, title: "Entrance A", color: "#d32f2f", content: "🚗 Available: 5 spots\n🅿️ Near main gate" },
    { lat: -0.06585, lng: 34.77602, title: "VIP Parking", color: "#f57c00", content: "🚗🚗 Limited spots!\n💳 Access card required" },
    { lat: -0.06595, lng: 34.77702, title: "Security Office", color: "#388e3c", content: "🚗 = 3\n⚠️ Heavy traffic 🚦" }
  ];

  loadMarkers(dummyData);
}

// Initial load
fetchParkingData();

// Refresh every 5 seconds
setInterval(fetchParkingData, 5000);

// =======================
// ROUTING (last 2 clicks)
// =======================
map.on("click", e => {
  const lat = e.latlng.lat;
  const lng = e.latlng.lng;

  lastClicks.push([lat, lng]);
  if (lastClicks.length > 2) lastClicks.shift();

  if (lastClicks.length === 2) {
    if (routeLine) map.removeLayer(routeLine);

    const [start, end] = lastClicks;
    fetch(`https://router.project-osrm.org/route/v1/walking/${start[1]},${start[0]};${end[1]},${end[0]}?geometries=geojson`)
    .then(r => r.json())
    .then(data => {
      const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
      routeLine = L.polyline(coords, { color:'blue', weight:6 }).addTo(map);
    })
    .catch(() => {
      routeLine = L.polyline([start, end], { color:'green', weight:4 }).addTo(map);
    });
  }

  $("#lattitude").val(lat.toFixed(6));
  $("#longitude").val(lng.toFixed(6));
});

// Mouse move
map.on("mousemove", e => {
  $("#lattitude").val(e.latlng.lat.toFixed(6));
  $("#longitude").val(e.latlng.lng.toFixed(6));
});

// Ensure full map render
setTimeout(()=>map.invalidateSize(true),500);
setTimeout(()=>map.invalidateSize(true),1500);
</script>

</body>
</html>
