<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏙️ PARK PLACE 🏙️</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Google Maps API -->
  <script src="https://maps.googleapis.com/maps/api/js"></script>

  <style>
    #zoomSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      background: #3b82f6;
      border-radius: 50%;
      cursor: pointer;
    }
    #zoomSlider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      background: #3b82f6;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }
  </style>
</head>
<body class="flex flex-col items-center min-h-screen">

  <h1 class="text-3xl text-green-500 font-bold text-center mt-6">🏙️  {{.Street}}  🏙️</h1>
  <br>
  <i class="fas fa-sign-out-alt" data-target="#modalLoginForm">x</i>

  <!-- Main App Window -->
  <div id="mainwindow" class="w-4/5 mt-6 border-2 border-gray-300 rounded-2xl shadow-lg p-4 flex flex-col h-[80vh] relative">

    <!-- Map Section -->
    <div id="map" class="w-full flex-1 rounded-xl"></div>

    <!-- Floating Buttons -->
    <div class="absolute top-4 right-4 flex flex-col gap-2 z-10">
      <button id="btn" class="btn btn-primary w-32 text-sm flex items-center justify-center gap-1">
        📌 <i class="fas fa-sign-out-alt"></i>
      </button>
      <button class="btn btn-primary w-28">💾 Save</button>
      <label for="zoomSlider" class="text-xs font-medium text-white bg-blue-600 px-2 py-1 rounded-lg shadow-md text-center">
        Scale <span id="zoomValue">3</span>
      </label>
      <input type="range" id="zoomSlider" min="1" max="5" value="3" step="1" class="w-28 h-2 bg-gray-600 rounded-lg cursor-pointer accent-blue-500">
    </div>

    <!-- Coordinate Inputs -->
    <div class="flex flex-wrap gap-4 mt-4">
      <input type="text" id="lattitude" placeholder="Latitude" class="form-control flex-1">
      <input type="text" id="longitude" placeholder="Longitude" class="form-control flex-1">
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="coordModal" tabindex="-1" aria-labelledby="coordModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="text-xl md:text-2xl font-bold text-blue-600" id="coordModalLabel">📌 🅿️</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form method="post" action="BOOKPARKING">
 <label>Latitude:</label>
          <input type="text" id="modal-lat" class="form-control mb-2" readonly>
          <label>Longitude:</label>
          <input type="text" id="modal-lng" class="form-control mb-2" readonly>
          <label>CAR-REG:</label>
          <input type="text" id="modal-carreg" class="form-control mb-2">
          <label>LOCATION:</label>
          <input type="text" id="modal-location" class="form-control">

          </form>
         

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="confirmCoords">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <script>
let map, centerMarker, userPos;
let directionsService, directionsRenderer;

    function initMap() {
      const mapOptions = {
        zoom: 15,
        center: { lat:  -0.06575 , lng: 4.77402 },
        mapTypeId: "hybrid"
      };

      map = new google.maps.Map(document.getElementById("map"), mapOptions);

      directionsService = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer({ map: map });

      // CENTER marker (also opens dialog when clicked)
      centerMarker = new google.maps.Marker({
        position: mapOptions.center,
        map: map,
        title: ' 🚙 Park Place',
        icon: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png'
      });

      centerMarker.addListener("click", () => {
        const pos = centerMarker.getPosition();
        $("#modal-lat").val(pos.lat());
        $("#modal-lng").val(pos.lng());
        new bootstrap.Modal(document.getElementById('coordModal')).show();
      });


      // ADD YOUR EXTRA MARKERS HERE
      const extraMarkers = [
        {
          lat: -0.06575, lng: 34.77502,
          title: "Entrance A",
          icon: "https://maps.google.com/mapfiles/ms/icons/red-dot.png"
        },
        {
          lat: -0.06585, lng: 34.77602,
          title: "VIP Parking",
          icon: "https://maps.google.com/mapfiles/ms/icons/orange-dot.png"
        },
        {
          lat: -0.06595, lng: 34.77702,
          title: "Security Office",
          icon: "https://maps.google.com/mapfiles/ms/icons/green-dot.png"
        }
      ];


      ////////////////////////////////

      // Try to show user's own location too
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    function(position) {
      userPos = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
      };

      const userMarker = new google.maps.Marker({
        position: userPos,
        map: map,
        title: "You are here",
        icon: "https://maps.google.com/mapfiles/ms/icons/yellow-dot.png"
      });

      map.setCenter(userPos);
    },
    function(error) {
      console.error("Geolocation error:", error);
    }
  );
}   else {
  console.log("Geolocation not supported by this browser");
}
      //////////////////////////////////

      extraMarkers.forEach(markerData => {
        const marker = new google.maps.Marker({
          position: markerData,
          map: map,
          title: markerData.title,
          icon: markerData.icon
        });

    marker.addListener("click", () => {
  const pos = marker.getPosition();
  $("#modal-lat").val(pos.lat());
  $("#modal-lng").val(pos.lng());
  new bootstrap.Modal(document.getElementById('coordModal')).show();

  if (userPos) {
    directionsService.route(
      {
        origin: userPos,
        destination: pos,
        travelMode: google.maps.TravelMode.WALKING
      },
      (response, status) => {
        if (status === "OK") {
          directionsRenderer.setDirections(response);
        } else {
          console.error("Directions failed:", status);
        }
      }
    );
  }
});
      });
    }

    // Zoom slider
    document.getElementById('zoomSlider').addEventListener('input', function() {
      map.setZoom(18 - parseInt(this.value));
      document.getElementById('zoomValue').textContent = this.value;
    });

    // Confirm modal
    $(document).on("click", "#confirmCoords", function(){
      const lat = parseFloat($("#modal-lat").val());
      const lng = parseFloat($("#modal-lng").val());
      $("#lattitude, #longitude").val([lat, lng]);
      if (centerMarker && !isNaN(lat) && !isNaN(lng)) {
        centerMarker.setPosition({ lat, lng });
        map.setCenter({ lat, lng });
      }
      bootstrap.Modal.getInstance(document.getElementById('coordModal')).hide();
    });

    window.onload = initMap;
  </script>

</body>
</html>
